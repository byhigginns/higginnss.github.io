<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VR Зал Суда — Мультиплеер</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #0a0805; overflow: hidden; font-family: 'Georgia', serif; }

  #lobby {
    position: fixed; inset: 0; z-index: 10000;
    background: radial-gradient(ellipse at center, #2a1f14 0%, #100c08 100%);
    display: flex; align-items: center; justify-content: center;
    color: #e8d9b5;
  }
  #lobby-box {
    background: rgba(20,15,10,0.92);
    border: 1px solid #8a6d2f;
    border-radius: 14px;
    padding: 36px 42px;
    width: 420px;
    max-width: 90vw;
    box-shadow: 0 0 60px rgba(180,140,40,0.15);
  }
  #lobby-box h1 {
    font-size: 24px; margin: 0 0 4px; color: #d4af37; letter-spacing: 1px;
    text-align: center;
  }
  #lobby-box .sub { text-align:center; color:#9a8a6a; font-size:13px; margin-bottom:24px; }
  .field { margin-bottom: 16px; }
  .field label { display:block; font-size:12px; color:#bfa867; margin-bottom:6px; letter-spacing:1px; text-transform:uppercase; }
  .field input {
    width:100%; padding:10px 12px; background:#1a140c; border:1px solid #5a4826;
    border-radius:6px; color:#f0e6c8; font-size:15px; font-family: inherit;
  }
  .field input:focus { outline:none; border-color:#d4af37; }
  .roles { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .role-btn {
    padding:10px 8px; background:#1a140c; border:1px solid #5a4826; border-radius:6px;
    color:#cbb98a; cursor:pointer; font-size:13px; text-align:center; transition:.15s;
  }
  .role-btn:hover { border-color:#d4af37; }
  .role-btn.selected { background:#3a2c12; border-color:#d4af37; color:#fff; }
  .tabs { display:flex; gap:8px; margin-bottom:18px; }
  .tab {
    flex:1; padding:10px; text-align:center; cursor:pointer; border-radius:6px 6px 0 0;
    border:1px solid #5a4826; border-bottom:none; color:#9a8a6a; font-size:13px;
  }
  .tab.active { background:#1a140c; color:#d4af37; }
  #room-code-display {
    background:#1a140c; border:1px dashed #d4af37; border-radius:6px; padding:12px;
    text-align:center; font-size:22px; letter-spacing:4px; color:#d4af37; margin-bottom:14px; display:none;
  }
  #enter-vr-btn {
    width:100%; padding:14px; margin-top:8px; background:linear-gradient(180deg,#d4af37,#a3811f);
    border:none; border-radius:8px; color:#1a140c; font-weight:bold; font-size:15px;
    cursor:pointer; letter-spacing:1px; text-transform:uppercase;
  }
  #enter-vr-btn:disabled { opacity:0.4; cursor:not-allowed; }
  #lobby-status { text-align:center; color:#9a8a6a; font-size:12px; margin-top:12px; min-height:16px; }
  #lobby-error { color:#d96b6b; }

  #hud {
    position: fixed; top: 14px; left: 14px; z-index: 9998;
    color: #e8d9b5; font-size: 13px; background: rgba(15,10,5,0.7);
    border: 1px solid #5a4826; border-radius: 10px; padding: 10px 16px;
    pointer-events: none; display:none;
  }
  #mic-btn {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 9999;
    width:56px; height:56px; border-radius:50%; border:2px solid #d4af37;
    background: rgba(20,15,10,0.85); color:#d4af37; font-size:22px; cursor:pointer; display:none;
  }
  #mic-btn.muted { background:#5a1f1f; border-color:#d96b6b; color:#d96b6b; }
</style>
</head>
<body>

<!-- ===================== ЛОББИ ===================== -->
<div id="lobby">
  <div id="lobby-box">
    <h1>⚖ ЗАЛ СУДА</h1>
    <div class="sub">VR ролевая симуляция · мультиплеер</div>

    <div class="field">
      <label>Ваше имя</label>
      <input type="text" id="player-name" placeholder="Иван Петров" maxlength="20" />
    </div>

    <div class="tabs">
      <div class="tab active" id="tab-create">Создать комнату</div>
      <div class="tab" id="tab-join">Войти по коду</div>
    </div>

    <div id="room-code-display"></div>

    <div class="field" id="join-field" style="display:none;">
      <label>Код комнаты</label>
      <input type="text" id="room-code-input" placeholder="напр. COURT482" maxlength="12" style="text-transform:uppercase;" />
    </div>

    <div class="field">
      <label>Ваша роль</label>
      <div class="roles">
        <div class="role-btn" data-role="judge">👨‍⚖️ Судья</div>
        <div class="role-btn" data-role="defense">🛡️ Адвокат защиты</div>
        <div class="role-btn" data-role="prosecution">⚔️ Прокурор</div>
        <div class="role-btn selected" data-role="spectator">👥 Зритель</div>
      </div>
    </div>

    <button id="enter-vr-btn">Войти в зал суда</button>
    <div id="lobby-status"></div>
  </div>
</div>

<!-- ===================== HUD / MIC ===================== -->
<div id="hud">Комната: <b id="hud-room">-</b> &nbsp;|&nbsp; Участников: <b id="hud-count">1</b></div>
<button id="mic-btn">🎤</button>

<!-- ===================== VR СЦЕНА ===================== -->
<a-scene
  background="color:#0d0a07"
  renderer="antialias:true; colorManagement:true"
  vr-mode-ui="enabled:true"
  loading-screen="dotsColor:#d4af37; backgroundColor:#0d0a07"
  embedded
>

  <a-assets></a-assets>

  <a-entity fog="type:exponential; color:#0d0a07; density:0.025"></a-entity>

  <!-- СВЕТ -->
  <a-light type="ambient" color="#3a2c18" intensity="1.6"></a-light>
  <a-light type="point" color="#ffd98a" intensity="1.4" position="0 5.2 -4" distance="14"></a-light>
  <a-light type="point" color="#ffd98a" intensity="0.7" position="-6 4.5 2" distance="12"></a-light>
  <a-light type="point" color="#ffd98a" intensity="0.7" position="6 4.5 2" distance="12"></a-light>
  <a-light type="directional" color="#fff3d6" intensity="0.5" position="0 4 6"></a-light>

  <!-- ===== ПОЛ ===== -->
  <a-plane rotation="-90 0 0" width="20" height="22" position="0 0 -4"
    color="#3a2415" material="roughness:0.7; metalness:0.05"></a-plane>
  <!-- ковровая дорожка к судье -->
  <a-plane rotation="-90 0 0" width="3" height="14" position="0 0.005 -4"
    color="#5a1820" material="roughness:0.9"></a-plane>

  <!-- ===== ПОТОЛОК ===== -->
  <a-plane rotation="90 0 0" width="20" height="22" position="0 6.5 -4" color="#241a10"></a-plane>

  <!-- ===== СТЕНЫ ===== -->
  <a-plane position="0 3.25 -15" width="20" height="6.5" color="#4a3420" material="roughness:0.85"></a-plane>
  <a-plane position="-10 3.25 -4" rotation="0 90 0" width="22" height="6.5" color="#42301d"></a-plane>
  <a-plane position="10 3.25 -4" rotation="0 -90 0" width="22" height="6.5" color="#42301d"></a-plane>
  <a-plane position="0 3.25 7" rotation="0 180 0" width="20" height="6.5" color="#4a3420"></a-plane>

  <!-- декоративные панели на задней стене -->
  <a-plane position="0 3.6 -14.95" width="14" height="4.6" color="#2c2012" material="roughness:0.6"></a-plane>

  <!-- ===== ГЕРБ / СИМВОЛ ПРАВОСУДИЯ за судьёй ===== -->
  <a-entity position="0 4.6 -14.8">
    <a-circle radius="0.9" color="#1f160c" material="shader:flat"></a-circle>
    <a-circle radius="0.82" color="#d4af37" material="shader:flat" position="0 0 0.01"></a-circle>
    <a-text value="ВЕСЫ ПРАВОСУДИЯ" align="center" color="#1f160c" width="2.2" position="0 0 0.02"></a-text>
    <!-- весы -->
    <a-cylinder radius="0.015" height="0.55" color="#3a2c12" position="0 -0.35 0.02"></a-cylinder>
    <a-cylinder radius="0.015" height="0.55" rotation="0 0 90" color="#3a2c12" position="0 -0.1 0.02"></a-cylinder>
    <a-sphere radius="0.07" color="#3a2c12" position="-0.27 -0.18 0.02"></a-sphere>
    <a-sphere radius="0.07" color="#3a2c12" position="0.27 -0.18 0.02"></a-sphere>
  </a-entity>

  <!-- ===== КОЛОННЫ ===== -->
  <a-cylinder position="-9 3.25 -10" radius="0.35" height="6.5" color="#5a4226" material="roughness:0.5"></a-cylinder>
  <a-cylinder position="9 3.25 -10" radius="0.35" height="6.5" color="#5a4226" material="roughness:0.5"></a-cylinder>
  <a-cylinder position="-9 3.25 0" radius="0.35" height="6.5" color="#5a4226" material="roughness:0.5"></a-cylinder>
  <a-cylinder position="9 3.25 0" radius="0.35" height="6.5" color="#5a4226" material="roughness:0.5"></a-cylinder>

  <!-- ===== ОКНА (боковые, со светом) ===== -->
  <a-plane position="-9.9 4 -7" rotation="0 90 0" width="2.4" height="3.4" color="#ffe9b0" material="shader:flat; opacity:0.55; transparent:true"></a-plane>
  <a-plane position="-9.9 4 -2" rotation="0 90 0" width="2.4" height="3.4" color="#ffe9b0" material="shader:flat; opacity:0.55; transparent:true"></a-plane>
  <a-plane position="9.9 4 -7" rotation="0 -90 0" width="2.4" height="3.4" color="#ffe9b0" material="shader:flat; opacity:0.55; transparent:true"></a-plane>
  <a-plane position="9.9 4 -2" rotation="0 -90 0" width="2.4" height="3.4" color="#ffe9b0" material="shader:flat; opacity:0.55; transparent:true"></a-plane>

  <!-- ===== СУДЕЙСКАЯ КАФЕДРА (возвышение) ===== -->
  <a-entity position="0 0 -12">
    <a-box width="6.5" height="1.1" depth="2.2" color="#3a2a16" position="0 0.55 0" material="roughness:0.4"></a-box>
    <a-box width="6.7" height="0.08" depth="2.4" color="#1f160c" position="0 1.13 0"></a-box>
    <!-- передняя панель с резьбой (декор полосками) -->
    <a-box width="6.5" height="0.04" depth="0.02" color="#d4af37" position="0 0.95 1.1"></a-box>
    <a-box width="6.5" height="0.04" depth="0.02" color="#d4af37" position="0 0.3 1.1"></a-box>
    <!-- кресло судьи -->
    <a-box width="1.1" height="1.3" depth="0.1" color="#5a1820" position="0 1.95 -0.7" material="roughness:0.7"></a-box>
    <a-box width="1.1" height="0.1" depth="0.9" color="#3a2a16" position="0 1.18 -0.3"></a-box>
    <!-- балдахин над судьёй -->
    <a-box width="1.6" height="0.06" depth="1.2" color="#3a2a16" position="0 3.1 -0.4"></a-box>
  </a-entity>

  <!-- молоток судьи (кликабельный объект) -->
  <a-entity id="gavel" position="1.4 1.25 -11.6" class="clickable" rotation="0 0 0">
    <a-cylinder radius="0.025" height="0.32" color="#3a2412" rotation="0 0 90"></a-cylinder>
    <a-cylinder radius="0.06" height="0.14" color="#5a3a1a" position="0.16 0 0"></a-cylinder>
    <a-text value="🔨 МОЛОТОК" align="center" color="#d4af37" width="1.4" position="0 0.18 0"></a-text>
  </a-entity>

  <!-- ===== МЕСТО СВИДЕТЕЛЯ ===== -->
  <a-entity position="-3.6 0 -10.5" rotation="0 35 0">
    <a-cylinder radius="0.6" height="0.9" color="#3a2a16" position="0 0.45 0"></a-cylinder>
    <a-box width="0.9" height="0.6" depth="0.08" color="#5a1820" position="0 1.2 -0.35"></a-box>
  </a-entity>

  <!-- ===== СТОЛ ЗАЩИТЫ (слева) ===== -->
  <a-entity position="-3.2 0 -6">
    <a-box width="2.6" height="0.85" depth="1.1" color="#3a2a16" material="roughness:0.4"></a-box>
    <a-box width="2.7" height="0.05" depth="1.2" color="#1f160c" position="0 0.45 0"></a-box>
    <a-text value="ЗАЩИТА" align="center" color="#9ab8e0" width="2.5" position="0 0.5 0.65" rotation="-30 0 0"></a-text>
    <!-- 2 стула -->
    <a-box width="0.5" height="0.45" depth="0.5" color="#241a10" position="-0.6 0.22 1.0"></a-box>
    <a-box width="0.5" height="0.45" depth="0.5" color="#241a10" position="0.6 0.22 1.0"></a-box>
  </a-entity>

  <!-- ===== СТОЛ ОБВИНЕНИЯ (справа) ===== -->
  <a-entity position="3.2 0 -6">
    <a-box width="2.6" height="0.85" depth="1.1" color="#3a2a16" material="roughness:0.4"></a-box>
    <a-box width="2.7" height="0.05" depth="1.2" color="#1f160c" position="0 0.45 0"></a-box>
    <a-text value="ОБВИНЕНИЕ" align="center" color="#d49a9a" width="2.5" position="0 0.5 0.65" rotation="-30 0 0"></a-text>
    <a-box width="0.5" height="0.45" depth="0.5" color="#241a10" position="-0.6 0.22 1.0"></a-box>
    <a-box width="0.5" height="0.45" depth="0.5" color="#241a10" position="0.6 0.22 1.0"></a-box>
  </a-entity>

  <!-- ===== ТРИБУНА (по центру, между столами) ===== -->
  <a-entity position="0 0 -8.6">
    <a-box width="0.9" height="1.15" depth="0.6" color="#3a2a16"></a-box>
    <a-box width="1.0" height="0.05" depth="0.7" color="#1f160c" position="0 0.6 0"></a-box>
  </a-entity>

  <!-- ===== ГАЛЕРЕЯ (зрительские скамьи), floor.класс для телепорта ===== -->
  <a-entity id="gallery"></a-entity>

  <!-- общий пол как поверхность телепорта -->
  <a-plane class="floor" rotation="-90 0 0" width="20" height="22" position="0 0.01 -4"
    visible="false"></a-plane>

  <!-- ===== ИГРОК / RIG ===== -->
  <a-entity id="rig" position="0 0 4">
    <a-camera id="camera" look-controls wasd-controls="acceleration:14">
      <a-entity id="crosshair" geometry="primitive:ring; radiusInner:0.008; radiusOuter:0.012"
        material="color:#d4af37; shader:flat" position="0 0 -1"></a-entity>
    </a-camera>

    <a-entity id="left-hand"
      oculus-touch-controls="hand:left" vive-controls="hand:left" windows-motion-controls="hand:left">
    </a-entity>

    <a-entity id="right-hand"
      oculus-touch-controls="hand:right" vive-controls="hand:right" windows-motion-controls="hand:right"
      raycaster="objects: .floor, .clickable; far:12"
      line="color:#d4af37; opacity:0.6">
    </a-entity>
  </a-entity>

  <!-- ===== КОНТЕЙНЕР АВАТАРОВ ДРУГИХ ИГРОКОВ ===== -->
  <a-entity id="avatars-container"></a-entity>

</a-scene>

<!-- ===================== AUDIO ELEMENTS КОНТЕЙНЕР ===================== -->
<div id="audio-container" style="display:none;"></div>

<script>
// =========================================================================
// СОЗДАНИЕ ГАЛЕРЕИ СКАМЕЕК (программно, 3 ряда по 2 секции)
// =========================================================================
function buildGallery() {
  const container = document.getElementById('gallery');
  const rows = [ -0.5, 1.2, 2.9 ];
  rows.forEach((z, i) => {
    [-3.5, 3.5].forEach(xBase => {
      const bench = document.createElement('a-entity');
      bench.setAttribute('position', `${xBase} 0 ${z}`);
      bench.innerHTML = `
        <a-box width="3.4" height="0.5" depth="0.5" color="#3a2a16" position="0 0.25 0"></a-box>
        <a-box width="3.4" height="0.6" depth="0.06" color="#2c2012" position="0 0.7 -0.22"></a-box>
      `;
      container.appendChild(bench);
    });
  });
}
buildGallery();

// =========================================================================
// СОСТОЯНИЕ
// =========================================================================
const state = {
  name: '', role: 'spectator', roomCode: '', isHost: false,
  peer: null, localStream: null, micEnabled: true,
  connections: {},   // peerId -> DataConnection
  calls: {},         // peerId -> MediaConnection
  peersMeta: {},      // peerId -> {name, role}
};

const ROLE_LABEL = {
  judge: '👨‍⚖️ Судья', defense: '🛡️ Защита', prosecution: '⚔️ Обвинение', spectator: '👥 Зритель'
};
const ROLE_COLOR = {
  judge: '#d4af37', defense: '#5a8ad4', prosecution: '#c45a5a', spectator: '#8a8a8a'
};
// Куда "телепортируется" игрок по умолчанию при выборе роли
const ROLE_SPAWN = {
  judge: { x: 0, z: -10.4 },
  defense: { x: -3.2, z: -5.0 },
  prosecution: { x: 3.2, z: -5.0 },
  spectator: { x: 0, z: 3.5 }
};

// =========================================================================
// ЛОББИ — UI ЛОГИКА
// =========================================================================
let lobbyMode = 'create';

document.getElementById('tab-create').addEventListener('click', () => {
  lobbyMode = 'create';
  document.getElementById('tab-create').classList.add('active');
  document.getElementById('tab-join').classList.remove('active');
  document.getElementById('join-field').style.display = 'none';
  document.getElementById('room-code-display').style.display = 'none';
});
document.getElementById('tab-join').addEventListener('click', () => {
  lobbyMode = 'join';
  document.getElementById('tab-join').classList.add('active');
  document.getElementById('tab-create').classList.remove('active');
  document.getElementById('join-field').style.display = 'block';
  document.getElementById('room-code-display').style.display = 'none';
});

document.querySelectorAll('.role-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    state.role = btn.dataset.role;
  });
});

function setStatus(msg, isError) {
  const el = document.getElementById('lobby-status');
  el.textContent = msg;
  el.className = isError ? 'lobby-error' : '';
  el.style.color = isError ? '#d96b6b' : '#9a8a6a';
}

function randomRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = 'COURT';
  for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

document.getElementById('enter-vr-btn').addEventListener('click', async () => {
  const nameInput = document.getElementById('player-name').value.trim();
  if (!nameInput) { setStatus('Введите имя', true); return; }
  state.name = nameInput;

  document.getElementById('enter-vr-btn').disabled = true;
  setStatus('Подключение к микрофону...');

  try {
    state.localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch (e) {
    setStatus('Микрофон недоступен — голосовой чат отключён, но игра продолжится', true);
    state.localStream = null;
  }

  if (lobbyMode === 'create') {
    state.roomCode = randomRoomCode();
    state.isHost = true;
    setStatus('Создание комнаты...');
    initPeer(state.roomCode, () => {
      document.getElementById('room-code-display').style.display = 'block';
      document.getElementById('room-code-display').textContent = state.roomCode;
      setStatus('Комната создана! Поделитесь кодом с другими.');
      finishJoin();
    });
  } else {
    const code = document.getElementById('room-code-input').value.trim().toUpperCase();
    if (!code) { setStatus('Введите код комнаты', true); document.getElementById('enter-vr-btn').disabled = false; return; }
    state.roomCode = code;
    state.isHost = false;
    setStatus('Подключение к комнате...');
    const myId = 'user-' + Math.random().toString(36).substr(2, 9);
    initPeer(myId, () => connectToHost(code));
  }
});

function finishJoin() {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  if (state.localStream) document.getElementById('mic-btn').style.display = 'block';
  document.getElementById('hud-room').textContent = state.roomCode;
  spawnLocalPlayer();
  startNetworkLoop();
}

function spawnLocalPlayer() {
  const spawn = ROLE_SPAWN[state.role] || ROLE_SPAWN.spectator;
  const rig = document.getElementById('rig');
  rig.setAttribute('position', `${spawn.x} 0 ${spawn.z}`);
  if (state.role === 'judge' || state.role === 'defense' || state.role === 'prosecution') {
    rig.setAttribute('rotation', '0 180 0'); // лицом к залу/центру
  }
}

// =========================================================================
// PEERJS — СЕТЬ
// =========================================================================
function initPeer(id, onReady) {
  state.peerId = id;
  state.peerReady = onReady;
  state.peerRetries = 0;

  state.peer = new Peer(id, {
    debug: 1,
    config: { iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' }
    ]}
  });

  state.peer.on('open', () => {
    state.peerRetries = 0;
    onReady();
  });

  // Сеть/сервер моргнули — пробуем переподключиться, не показывая фатальную ошибку сразу
  state.peer.on('disconnected', () => {
    console.warn('Peer disconnected, attempting reconnect...');
    setStatus('Соединение прервалось, переподключение...', false);
    setTimeout(() => {
      if (state.peer && !state.peer.destroyed) state.peer.reconnect();
    }, 800);
  });

  state.peer.on('error', (err) => {
    console.error('Peer error:', err);
    if (err.type === 'unavailable-id') {
      setStatus('Этот код уже занят, попробуйте создать заново', true);
      document.getElementById('enter-vr-btn').disabled = false;
    } else if (err.type === 'peer-unavailable') {
      setStatus('Комната с таким кодом не найдена', true);
      document.getElementById('enter-vr-btn').disabled = false;
    } else if (err.type === 'network' || err.type === 'server-error' || err.type === 'socket-error' || err.type === 'socket-closed') {
      // Сервер сигнализации моргнул — пробуем пересоздать соединение пару раз, прежде чем сдаться
      state.peerRetries++;
      if (state.peerRetries <= 3) {
        setStatus(`Связь со сервером нестабильна, повтор попытки (${state.peerRetries}/3)...`, false);
        setTimeout(() => {
          if (state.peer && !state.peer.destroyed) {
            state.peer.reconnect();
          } else {
            initPeer(state.peerId, state.peerReady);
          }
        }, 1200);
      } else {
        setStatus('Не получается подключиться к серверу сигнализации. Проверьте интернет/VPN/блокировщик рекламы и попробуйте ещё раз.', true);
        document.getElementById('enter-vr-btn').disabled = false;
      }
    } else {
      setStatus('Ошибка сети: ' + err.type, true);
      document.getElementById('enter-vr-btn').disabled = false;
    }
  });

  // Входящие data-соединения (host принимает от joiner'ов; любой может принять от mesh-партнёров)
  state.peer.on('connection', (conn) => {
    setupDataConnection(conn);
  });

  // Входящие голосовые звонки
  state.peer.on('call', (call) => {
    call.answer(state.localStream || undefined);
    call.on('stream', (remoteStream) => playRemoteAudio(call.peer, remoteStream));
    state.calls[call.peer] = call;
  });
}

function setupDataConnection(conn) {
  state.connections[conn.peer] = conn;

  conn.on('open', () => {
    // Если мы хост — отправляем новому участнику список уже известных пиров
    if (state.isHost) {
      const peerList = Object.keys(state.peersMeta).filter(id => id !== conn.peer);
      conn.send({ type: 'peer-list', peers: peerList, meta: state.peersMeta });
    }
    // Отправляем своё имя/роль
    conn.send({ type: 'hello', name: state.name, role: state.role });
  });

  conn.on('data', (data) => handleData(conn.peer, data));

  conn.on('close', () => {
    delete state.connections[conn.peer];
    delete state.peersMeta[conn.peer];
    removeAvatar(conn.peer);
    updateHudCount();
  });
}

function handleData(peerId, data) {
  if (data.type === 'hello') {
    state.peersMeta[peerId] = { name: data.name, role: data.role };
    createOrUpdateAvatar(peerId, data.name, data.role);
    updateHudCount();
  } else if (data.type === 'peer-list') {
    // Подключаемся к каждому уже существующему участнику (mesh)
    Object.assign(state.peersMeta, data.meta);
    data.peers.forEach(pid => {
      if (pid !== state.peer.id && !state.connections[pid]) {
        connectToPeer(pid);
      }
    });
  } else if (data.type === 'state') {
    updateAvatarTransform(peerId, data);
  } else if (data.type === 'gavel') {
    playGavelSound();
  } else if (data.type === 'role-change') {
    state.peersMeta[peerId] = state.peersMeta[peerId] || {};
    state.peersMeta[peerId].role = data.role;
    updateAvatarRole(peerId, data.role);
  }
}

function connectToHost(hostId) {
  connectToPeer(hostId);
}

function connectToPeer(peerId) {
  const conn = state.peer.connect(peerId, { reliable: true });
  setupDataConnection(conn);

  if (state.localStream) {
    const call = state.peer.call(peerId, state.localStream);
    if (call) {
      call.on('stream', (remoteStream) => playRemoteAudio(peerId, remoteStream));
      state.calls[peerId] = call;
    }
  }

  conn.on('open', () => {
    // если мы только что вошли — переходим к сцене после первого успешного коннекта
    if (document.getElementById('lobby').style.display !== 'none') {
      finishJoin();
    }
  });

  // Подстраховка: если соединение не открылось за 6 сек, всё равно входим в зал (одни в комнате)
  setTimeout(() => {
    if (document.getElementById('lobby').style.display !== 'none') {
      setStatus('Не удалось связаться с комнатой — входим в одиночном режиме', true);
      finishJoin();
    }
  }, 6000);
}

// =========================================================================
// ГОЛОС
// =========================================================================
function playRemoteAudio(peerId, stream) {
  let audioEl = document.getElementById('audio-' + peerId);
  if (!audioEl) {
    audioEl = document.createElement('audio');
    audioEl.id = 'audio-' + peerId;
    audioEl.autoplay = true;
    document.getElementById('audio-container').appendChild(audioEl);
  }
  audioEl.srcObject = stream;
}

document.getElementById('mic-btn').addEventListener('click', () => {
  state.micEnabled = !state.micEnabled;
  if (state.localStream) {
    state.localStream.getAudioTracks().forEach(t => t.enabled = state.micEnabled);
  }
  const btn = document.getElementById('mic-btn');
  btn.classList.toggle('muted', !state.micEnabled);
  btn.textContent = state.micEnabled ? '🎤' : '🔇';
});

// =========================================================================
// АВАТАРЫ ДРУГИХ ИГРОКОВ
// =========================================================================
function createOrUpdateAvatar(peerId, name, role) {
  let av = document.getElementById('avatar-' + peerId);
  const color = ROLE_COLOR[role] || ROLE_COLOR.spectator;
  if (!av) {
    av = document.createElement('a-entity');
    av.id = 'avatar-' + peerId;
    av.innerHTML = `
      <a-sphere class="head" radius="0.13" color="${color}" position="0 0 0"></a-sphere>
      <a-cylinder class="body" radius="0.17" height="0.85" color="${color}" position="0 -0.55 0" material="opacity:0.9; transparent:true"></a-cylinder>
      <a-text class="nametag" value="${name} (${ROLE_LABEL[role] || role})" align="center" color="#fff" width="2.4" position="0 0.26 0" shader="flat"></a-text>
    `;
    document.getElementById('avatars-container').appendChild(av);
  } else {
    av.querySelector('.nametag').setAttribute('value', `${name} (${ROLE_LABEL[role] || role})`);
  }
}

function updateAvatarRole(peerId, role) {
  const av = document.getElementById('avatar-' + peerId);
  if (!av) return;
  const color = ROLE_COLOR[role] || ROLE_COLOR.spectator;
  av.querySelector('.head').setAttribute('color', color);
  av.querySelector('.body').setAttribute('color', color);
  const meta = state.peersMeta[peerId];
  if (meta) av.querySelector('.nametag').setAttribute('value', `${meta.name} (${ROLE_LABEL[role] || role})`);
}

function updateAvatarTransform(peerId, data) {
  const av = document.getElementById('avatar-' + peerId);
  if (!av) return;
  av.setAttribute('position', data.head.p);
  av.setAttribute('rotation', `0 ${data.head.r.y} 0`);
}

function removeAvatar(peerId) {
  const av = document.getElementById('avatar-' + peerId);
  if (av) av.parentNode.removeChild(av);
  const audioEl = document.getElementById('audio-' + peerId);
  if (audioEl) audioEl.parentNode.removeChild(audioEl);
}

function updateHudCount() {
  document.getElementById('hud-count').textContent = Object.keys(state.peersMeta).length + 1;
}

// =========================================================================
// СЕТЕВОЙ ЦИКЛ — рассылка своей позиции
// =========================================================================
function startNetworkLoop() {
  setInterval(() => {
    const camera = document.getElementById('camera');
    if (!camera.object3D) return;
    const worldPos = new THREE.Vector3();
    camera.object3D.getWorldPosition(worldPos);
    const euler = camera.object3D.rotation;

    const payload = {
      type: 'state',
      head: {
        p: { x: worldPos.x, y: worldPos.y, z: worldPos.z },
        r: { y: THREE.MathUtils.radToDeg(euler.y) }
      }
    };
    Object.values(state.connections).forEach(conn => {
      if (conn.open) conn.send(payload);
    });
  }, 100);
}

// =========================================================================
// ТЕЛЕПОРТ ДВИЖЕНИЕ (правый контроллер, триггер)
// =========================================================================
document.addEventListener('DOMContentLoaded', () => {
  const rightHand = document.getElementById('right-hand');

  rightHand.addEventListener('triggerup', () => {
    const raycasterComp = rightHand.components.raycaster;
    if (!raycasterComp) return;
    const intersections = raycasterComp.intersections;
    if (intersections && intersections.length > 0) {
      const hit = intersections[0];
      const el = hit.object.el;

      if (el && el.classList.contains('floor')) {
        const rig = document.getElementById('rig');
        rig.setAttribute('position', { x: hit.point.x, y: 0, z: hit.point.z });
      } else if (el && el.id === 'gavel') {
        useGavel();
      }
    }
  });
});

// Десктоп-фоллбек: клик мышью по полу = телепорт (для теста на ПК)
document.addEventListener('click', (e) => {
  if (document.getElementById('lobby').style.display === 'none') {
    const camera = document.getElementById('camera');
    if (!camera.components.raycaster) return;
  }
});

// =========================================================================
// МОЛОТОК СУДЬИ
// =========================================================================
let gavelAudioCtx = null;
function playGavelSound() {
  try {
    if (!gavelAudioCtx) gavelAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = gavelAudioCtx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(140, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.12);
    gain.gain.setValueAtTime(0.5, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.25);
  } catch (e) {}
}

function useGavel() {
  if (state.role !== 'judge') {
    console.log('Только судья может пользоваться молотком');
    return;
  }
  playGavelSound();
  Object.values(state.connections).forEach(conn => {
    if (conn.open) conn.send({ type: 'gavel' });
  });
}
</script>
